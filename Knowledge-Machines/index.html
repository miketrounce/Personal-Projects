<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Machines</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        --bg: #10141c;
        --panel: #18202c;
        --panel-strong: #1f2938;
        --border: #2c3b4d;
        --muted: #b7c4d4;
        --text: #f4f7fb;
        --accent: #6fb5ff;
        --accent-strong: #3f80d3;
        --shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(111, 181, 255, 0.14), transparent 24%),
          linear-gradient(180deg, #121824 0%, #0c1119 100%);
        color: var(--text);
      }

      main {
        width: min(100%, 1200px);
        margin: 0 auto;
        padding: 32px 22px 44px;
      }

      .hero,
      .card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(180deg, var(--panel) 0%, #141b26 100%);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 48px 40px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        align-items: center;
      }

      .hero-left {
        display: flex;
        flex-direction: column;
      }

      .hero-graphic {
        width: 100%;
        aspect-ratio: 4/3;
        border-radius: 16px;
        background: linear-gradient(135deg, #1a2436 0%, #0f1720 100%);
        border: 1px solid var(--border);
        overflow: hidden;
        position: relative;
      }

      .hero-graphic svg {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }

      .hero-title {
        display: inline-block;
        font-size: clamp(2.8rem, 7vw, 5.4rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        margin: 0 0 6px;
        padding-bottom: 14px;
        border-bottom: 5px solid var(--accent);
      }

      .hero-subtitle {
        font-size: clamp(1.3rem, 3vw, 2rem);
        font-weight: 400;
        color: var(--muted);
        margin: 24px 0 16px;
        line-height: 1.3;
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.75rem;
        color: #b8d8ff;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(3rem, 6vw, 4.9rem);
        line-height: 0.92;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 1.55rem;
      }

      h3 {
        margin-bottom: 8px;
        font-size: 1.15rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .hero-actions,
      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 700;
      }

      a.primary {
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #0d1724;
      }

      a.secondary {
        color: var(--text);
        border: 1px solid var(--border);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .card {
        padding: 22px;
        background: linear-gradient(180deg, var(--panel-strong) 0%, #151d28 100%);
      }

      .product-card {
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .product-card .card-map {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 140px;
        opacity: 0.35;
      }

      .product-card h2 {
        font-size: 1.8rem;
        margin-bottom: 6px;
      }

      .product-footer {
        margin-top: auto;
        padding-top: 16px;
        display: flex;
        gap: 10px;
      }

      .product-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #0d1724;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 10px 24px;
        border-radius: 12px;
        text-decoration: none;
        letter-spacing: 0.01em;
        transition: filter 0.15s;
      }

      .product-btn:hover {
        filter: brightness(1.1);
      }

      .checkout-btn {
        background: linear-gradient(180deg, #28c840 0%, #1fa033 100%);
      }

      .product-badge {
        display: inline-block;
        padding: 8px 18px;
        border-radius: 12px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      /* Video modal */
      .video-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
      }

      .video-overlay.open {
        display: flex;
      }

      .video-wrapper {
        position: relative;
        width: min(90vw, 960px);
        aspect-ratio: 16/9;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      }

      .video-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .video-close {
        position: absolute;
        top: -44px;
        right: 0;
        background: none;
        border: none;
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
        padding: 4px 12px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>

      </section>

      <section class="grid" style="grid-template-columns: repeat(2, 1fr);">

    <div class="video-overlay" id="videoOverlay" onclick="closeVideo()">
      <div class="video-wrapper" onclick="event.stopPropagation()">
        <button class="video-close" onclick="closeVideo()">&times;</button>
        <iframe id="videoFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </div>

    <script>
      // Replace this URL with your real video when ready
      const VIDEO_URL = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1';

      function openVideo() {
        document.getElementById('videoFrame').src = VIDEO_URL;
        document.getElementById('videoOverlay').classList.add('open');
      }

      function closeVideo() {
        document.getElementById('videoOverlay').classList.remove('open');
        document.getElementById('videoFrame').src = '';
      }

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeVideo();
      });
    </script>

</html>
