<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael Trounce | Professional</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        --panel: #34312d;
        --panel-strong: #3a3632;
        --border: #45403a;
        --muted: #b8b0a4;
        --text: #f4f2ec;
        --accent: #d6aa58;
        --accent-dark: #b88733;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(214, 170, 88, 0.08), transparent 24%),
          linear-gradient(180deg, #322f2c 0%, #2b2926 100%);
        color: var(--text);
      }

      .page {
        width: min(100%, 1480px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 22px 24px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
      }

      .hero {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        padding: 22px 28px;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.4rem, 5vw, 3.6rem);
        font-weight: 900;
        margin: 0 0 4px;
        line-height: 1;
      }

      h3 {
        margin: 0 0 6px;
        font-size: 1.15rem;
        color: var(--text);
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin-top: 0;
      }

      .section-card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        padding: 18px 20px;
      }

      .routes-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .route-card {
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 18px 20px;
        background: linear-gradient(180deg, var(--panel-strong) 0%, #2f2c28 100%);
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .route-kicker {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        color: var(--accent);
        margin: 0;
      }

      .video-container {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #000;
        overflow: hidden;
      }

      .video-container video {
        width: 100%;
        display: block;
        border-radius: 14px;
      }

      .footer-link {
        text-align: center;
      }

      .footer-link a {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 400;
        text-decoration: none;
      }

      @media (max-width: 900px) {
        .routes-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Michael Trounce</h1>
      </section>

      <section class="section-card">
        <div class="routes-grid">
          <article class="route-card">
            <p class="route-kicker">Introduction</p>
            <h3>Who I am</h3>
            <div class="video-container">
              <video controls preload="metadata">
                <source src="MikeVideo.mp4" type="video/mp4">
              </video>
            </div>
            <p>Background, experience, and what I'm looking for next.</p>
          </article>

          <article class="route-card">
            <p class="route-kicker">Products</p>
            <h3>What I build</h3>
            <div class="video-container">
              <video controls preload="metadata">
                <source src="MikeVideo.mp4" type="video/mp4">
              </video>
            </div>
            <p>Dashboards, Knowledge Machines, and data tools for macro investors.</p>
          </article>

          <article class="route-card">
            <p class="route-kicker">Process</p>
            <h3>How I work</h3>
            <div class="video-container">
              <video controls preload="metadata">
                <source src="MikeVideo.mp4" type="video/mp4">
              </video>
            </div>
            <p>From idea to working prototype — fast iteration with AI tools.</p>
          </article>
        </div>
      </section>

    </main>
  </body>
</html>
